# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/Service/Notification/DTO/'
            - '../src/Service/Notification/Interface/'
            - '../src/Service/Report/DTO/'
            - '../src/Service/Report/ValueObject/'
            - '../src/Service/Report/Interface/'
            - '../src/Service/Report/Exception/'
            - '../src/Service/Order/DTO/'
            - '../src/Service/Order/ValueObject/'
            - '../src/Service/Order/Interface/'
            - '../src/Service/Order/Exception/'
            - '../src/Service/Order/Product/'
            - '../src/Interfaces/'

    # Order System - Tagged Iterator Pattern (OCP: Open/Closed Principle)
    _instanceof:
        App\Service\Order\Interface\PromotionInterface:
            tags: ['order.promotion']

    # Explicit interface bindings for DIP (Dependency Inversion Principle)
    App\Service\Order\Interface\PriceCalculatorInterface: '@App\Service\Order\Service\PriceCalculator'
    App\Service\Order\Interface\StockManagerInterface: '@App\Service\Order\Service\StockManager'

    App\Service\Order\Service\OrderProcessingService:
        arguments:
            $promotions: !tagged_iterator order.promotion

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # EVENT LISTENER - Manual configuration required
    # Must specify which event to listen to and which method to call
    App\EventListener\RequestLoggerListener:
        tags:
            - { name: kernel.event_listener, event: kernel.request, method: onKernelRequest }

    # ================================================================================
    # NOTIFICATION SYSTEM - Configuration SOLID
    # ================================================================================

    # Configuration des Formatters (chacun pour un canal spécifique)
    App\Service\Notification\Formatter\EmailFormatter: ~
    App\Service\Notification\Formatter\SmsFormatter: ~
    App\Service\Notification\Formatter\SlackFormatter: ~

    # Configuration des Channels avec injection des bons formatters
    # Chaque channel reçoit SON formatter spécifique
    App\Service\Notification\Channel\EmailChannel:
        arguments:
            $formatter: '@App\Service\Notification\Formatter\EmailFormatter'
        tags: ['app.notification_channel']

    App\Service\Notification\Channel\SmsChannel:
        arguments:
            $formatter: '@App\Service\Notification\Formatter\SmsFormatter'
        tags: ['app.notification_channel']

    App\Service\Notification\Channel\SlackChannel:
        arguments:
            $formatter: '@App\Service\Notification\Formatter\SlackFormatter'
        tags: ['app.notification_channel']

    # Logger de notifications
    App\Service\Notification\Logger\NotificationLogger: ~

    # Filter de notifications
    App\Service\Notification\Filter\UserPreferenceFilter: ~

    # Service principal - Reçoit TOUS les channels grâce au tag
    # Open/Closed Principle: Pour ajouter un nouveau canal, il suffit de :
    # 1. Créer la classe Channel
    # 2. Ajouter la config ici avec le tag 'app.notification_channel'
    # 3. Pas besoin de toucher NotificationService !
    App\Service\Notification\NotificationService:
        arguments:
            $channels: !tagged_iterator app.notification_channel
            $filter: '@App\Service\Notification\Filter\UserPreferenceFilter'
            $logger: '@App\Service\Notification\Logger\NotificationLogger'

    # ================================================================================
    # PAYMENT SYSTEM - Configuration SOLID
    # ================================================================================

    # Exclure les DTOs, ValueObjects, Interfaces et Exceptions de l'autowiring
    App\Service\Payment\:
        resource: '../src/Service/Payment/'
        exclude:
            - '../src/Service/Payment/DTO/'
            - '../src/Service/Payment/ValueObject/'
            - '../src/Service/Payment/Interface/'
            - '../src/Service/Payment/Exception/'

    # Configuration des FeeCalculators (un par moyen de paiement)
    App\Service\Payment\FeeCalculator\StripeFeeCalculator: ~
    App\Service\Payment\FeeCalculator\PayPalFeeCalculator: ~
    App\Service\Payment\FeeCalculator\BankTransferFeeCalculator: ~

    # Configuration des PaymentMethods avec injection des calculateurs de frais
    # Chaque PaymentMethod reçoit SON FeeCalculator spécifique
    App\Service\Payment\Method\StripePayment:
        arguments:
            $feeCalculator: '@App\Service\Payment\FeeCalculator\StripeFeeCalculator'
        tags: ['app.payment_method']

    App\Service\Payment\Method\PayPalPayment:
        arguments:
            $feeCalculator: '@App\Service\Payment\FeeCalculator\PayPalFeeCalculator'
        tags: ['app.payment_method']

    App\Service\Payment\Method\BankTransferPayment:
        arguments:
            $feeCalculator: '@App\Service\Payment\FeeCalculator\BankTransferFeeCalculator'
        tags: ['app.payment_method']

    # Logger de transactions (BDD)
    App\Service\Payment\Logger\TransactionPersister: ~

    # Alertes de transactions (emails admin)
    App\Service\Payment\Logger\TransactionAlert: ~

    # Service principal - Reçoit TOUS les PaymentMethods grâce au tag
    # Open/Closed Principle: Pour ajouter CryptoWallet, il suffit de :
    # 1. Créer CryptoWalletPayment implements PaymentMethodInterface
    # 2. Créer CryptoWalletFeeCalculator implements FeeCalculatorInterface
    # 3. Ajouter la config ici avec le tag 'app.payment_method'
    # 4. AUCUNE modification de PaymentService !
    App\Service\Payment\PaymentService:
        arguments:
            $paymentMethods: !tagged_iterator app.payment_method
            $validator: '@App\Service\Payment\Validator\PaymentValidator'
            $persister: '@App\Service\Payment\Logger\TransactionPersister'
            $alert: '@App\Service\Payment\Logger\TransactionAlert'

    # ================================================================================
    # REPORTING SYSTEM - Configuration SOLID
    # ================================================================================

    # DataProvider - Source des données
    App\Service\Report\DataProvider\MockSalesDataProvider: ~

    # Exporters - Tags pour l'injection via !tagged_iterator
    # ISP Démo: CSV et JSON n'implémentent QUE ReportExporterInterface
    #           PDF et Excel implémentent 3 interfaces (+ ChartCapable + FormattingCapable)
    App\Service\Report\Exporter\CsvReportExporter:
        tags: ['report.exporter']

    App\Service\Report\Exporter\JsonReportExporter:
        tags: ['report.exporter']

    App\Service\Report\Exporter\PdfReportExporter:
        tags: ['report.exporter']

    App\Service\Report\Exporter\ExcelReportExporter:
        tags: ['report.exporter']

    # Delivery Methods - Tags pour l'injection via !tagged_iterator
    App\Service\Report\Delivery\DownloadDelivery:
        tags: ['report.delivery']

    App\Service\Report\Delivery\EmailDelivery:
        tags: ['report.delivery']

    # Service principal - Orchestrateur de génération de rapports
    # Démontre TOUS les principes SOLID:
    # - SRP: Chaque classe a UNE responsabilité (DataProvider, Exporter, Delivery)
    # - OCP: Ajouter XmlExporter = créer classe + tag, ZÉRO modif du service
    # - LSP: Tous les exporters sont substituables via ReportExporterInterface
    # - ISP: ChartCapable et FormattingCapable SÉPARÉS (CSV n'est pas forcé de les impl)
    # - DIP: Dépend des INTERFACES, pas de classes concrètes
    App\Service\Report\ReportGeneratorService:
        arguments:
            $dataProvider: '@App\Service\Report\DataProvider\MockSalesDataProvider'
            $exporters: !tagged_iterator report.exporter
            $deliveryServices: !tagged_iterator report.delivery
